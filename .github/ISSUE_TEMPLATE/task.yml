name: Task
description: General implementation task tied to roadmap milestones.
title: "task: <short summary>"
labels: ["type:task", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: In scope / out of scope
    validations:
      required: true

  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      placeholder: |
        - Code changes
        - Tests
        - Docs updates
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true

  - type: textarea
    id: deps
    attributes:
      label: Dependencies / blockers
